<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu | Lesehan Sederhana</title>
    <style>
        body {
            margin: 0;
            background: url('images/lesehan.png') no-repeat center center/cover;
            font-family: sans-serif;
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        body,
        html {
            height: 100%;
        }

        .navbar {
            display: flex;
            justify-content: flex-end;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
        }

        .navbar a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            margin: 40px;
            background-color: rgba(240, 240, 230, 0.9);
            border-radius: 20px;
            padding: 75px;
        }

        .sidebar {
            flex: 1;
            margin-right: 20px;
        }

        .sidebar h3 {
            margin-bottom: 10px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar li {
            margin: 10px 0;
            padding: 10px;
            background-color: #b8bea9;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .sidebar li.active {
            background-color: #848c6e;
            color: white;
        }

        .menu-items {
            flex: 4;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .menu-card {
            background-color: #d9dbc9;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .menu-card img {
            width: 100%;
            border-radius: 15px;
        }

        .menu-card h4 {
            margin: 10px 0 5px 0;
        }

        .menu-card .price {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .menu-card .add-btn {
            background-color: #c7935b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>

<body>
