<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lesehan Sederhana</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body, html {
      height: 100%;
    }

    .hero {
      background: url('images/lesehan.png') no-repeat center center/cover;
      height: 100vh;
      position: relative;
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 20px;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.5);
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 1;
    }

    .content {
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3em;
      font-weight: bold;
      margin-bottom: 20px;
    }

    .btn {
      background-color: #c7935b;
      border: none;
      padding: 15px 30px;
      font-size: 1em;
      color: white;
      border-radius: 25px;
      cursor: pointer;
      margin-bottom: 10px;
    }

    .subtitle {
      font-weight: bold;
      font-size: 1.1em;
      text-transform: uppercase;
      margin-top: 20px;
    }

    .menu-icon {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 3;
    }

    .menu-icon div {
      width: 25px;
      height: 3px;
      background-color: white;
      margin: 5px 0;
    }

  </style>
</head>
<body>
  <div class="hero">
    <div class="overlay"></div>
    <div class="menu-icon">
      <div></div>
      <div></div>
      <div></div>
    </div>

    <div class="content">
      <h1>Lesehan Sederhana</h1>
      <a href="LihatMenu.html" class="btn">Lihat Menu</a>
      <div class="subtitle">Nikmati Sederhananya!</div>
    </div>
  </div>
</body>
</html>
