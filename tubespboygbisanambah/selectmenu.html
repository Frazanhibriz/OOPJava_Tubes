<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu | Lesehan Sederhana</title>
    <style>
        body {
            margin: 0;
            background: url('images/lesehan.png') no-repeat center center/cover;
            font-family: sans-serif;
            background-color: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
        }

        html,
        body {
            height: 100%;
        }

        .navbar {
            display: flex;
            justify-content: flex-end;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.6);
            color: white;
        }

        .navbar a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .container {
            display: flex;
            margin: 40px;
            background-color: rgba(240, 240, 230, 0.9);
            border-radius: 20px;
            padding: 75px;
        }

        .sidebar {
            flex: 1;
            margin-right: 20px;
        }

        .sidebar h3 {
            margin-bottom: 10px;
        }

        .sidebar ul {
            list-style: none;
            padding: 0;
        }

        .sidebar a.menu-link {
            display: block;
            margin: 10px 0;
            padding: 10px;
            background-color: #b8bea9;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            color: black;
            text-decoration: none;
            text-align: center;
        }

        .sidebar a.menu-link.active {
            background-color: #848c6e;
            color: white;
        }

        .menu-items {
            flex: 4;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            max-height: 600px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .menu-card {
            background-color: #d9dbc9;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .menu-card img {
            width: 100%;
            border-radius: 15px;
        }

        .menu-card h4 {
            margin: 10px 0 5px 0;
        }

        .menu-card .price {
            font-weight: bold;
            margin-bottom: 10px;
        }

        .menu-card .add-btn {
            background-color: #c7935b;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            font-size: 20px;
            cursor: pointer;
        }

        .order-footer {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            text-decoration: none;
            z-index: 1000;
        }

        .order-summary {
            background-color: #c7935b;
            color: white;
            padding: 15px 30px;
            border-radius: 30px;
            display: flex;
            gap: 30px;
            font-weight: bold;
            align-items: center;
            justify-content: center;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
            transition: background-color 0.3s ease;
        }

        .order-summary:hover {
            background-color: #a77945;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="navbar">
        <a href="#">HOME</a>
        <a href="#">MENU</a>
        <a href="#">MY ORDER</a>
    </div>

    <div class="container">
        <div class="sidebar">
            <h3>KATEGORI MENU</h3>
            <ul>
                <li><a class="menu-link active" href="LihatMenu.html">All Menu</a></li>
                <li><a class="menu-link" href="Makanan.html">MAKANAN</a></li>
                <li><a class="menu-link" href="Minuman.html">MINUMAN</a></li>
                <li><a class="menu-link" href="Cemilan.html">CAMILAN</a></li>
            </ul>
        </div>

        <div class="menu-items">
           
            <div class="menu-card">
                <img src="images/ayambakar.png" alt="Ayam Bakar" />
                <h4>Ayam Bakar</h4>
                <div class="price">15.000</div>
                <button class="add-btn">+</button>
            </div>
        
        </div>
    </div>

    <a href="order.html" class="order-footer">
        <div class="order-summary">
            <span>2 Items</span>
            <span>30.000</span>
            <span>&#10140;</span>
        </div>
    </a>
    

</body>

</html>
